name: pull-request-workflow
run-name: ${{github.actor}} está fazendo o pull request
on: [pull_request]

jobs:
  executar-projeto:
    runs-on: ubuntu-latest
    steps:
      - name: Clonando o repositorio e trocando para a branch "especifica"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Instalando o node versão 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Instalando as dependencias
        run: npm install

      - name: Rodando o sistema
        run: |
          node index.js &            
          SERVER_PID=$!              
          echo "Servidor rodando por 10 segundos..."
          sleep 10                   
          kill $SERVER_PID          
